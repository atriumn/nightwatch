name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material mkdocs-minify-plugin

      - run: mkdocs build

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_DBoGIS4soMteQUGnjbeZn2Y6
          vercel-project-id: prj_jegWySLaYV70SYHWWkfMOYg2tHD5
          vercel-args: --prod
          working-directory: site
